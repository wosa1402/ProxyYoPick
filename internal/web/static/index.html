<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyYoPick - SOCKS5 代理优选</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #1e293b;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 1.4rem; color: #38bdf8; font-weight: 700; }
        .header h1 span { color: #94a3b8; font-weight: 400; font-size: 0.9rem; margin-left: 0.5rem; }
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }
        .status-badge { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 9999px; font-weight: 600; }
        .status-idle { background: #1e3a5f; color: #38bdf8; }
        .status-running { background: #3b2f12; color: #fbbf24; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .btn {
            padding: 0.5rem 1.25rem; border: none; border-radius: 0.5rem;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; }
        .btn-success:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

        /* Tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #1e293b; }
        .tab {
            padding: 0.75rem 1.5rem; cursor: pointer; font-size: 0.9rem; font-weight: 600;
            color: #94a3b8; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
        }
        .tab:hover { color: #e2e8f0; }
        .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        .tab .count {
            background: #334155; color: #94a3b8; font-size: 0.7rem;
            padding: 0.1rem 0.4rem; border-radius: 9999px; margin-left: 0.4rem;
        }
        .tab.active .count { background: #1e3a5f; color: #38bdf8; }

        /* Stats cards */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #1e293b; border-radius: 0.75rem; padding: 1.25rem; border: 1px solid #334155;
        }
        .stat-card .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; }
        .stat-card .value.green { color: #4ade80; }
        .stat-card .value.red { color: #f87171; }
        .stat-card .value.blue { color: #38bdf8; }
        .stat-card .value.yellow { color: #fbbf24; }

        /* Import section */
        .import-section {
            background: #1e293b; border-radius: 0.75rem; padding: 1.25rem;
            border: 1px solid #334155; margin-bottom: 1.5rem;
        }
        .import-section h3 { font-size: 0.95rem; color: #e2e8f0; margin-bottom: 0.75rem; }
        .import-row { display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
        .import-textarea {
            flex: 1; min-width: 300px; min-height: 120px; max-height: 300px;
            background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
            border-radius: 0.5rem; padding: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem; resize: vertical;
        }
        .import-textarea:focus { outline: none; border-color: #38bdf8; }
        .import-textarea::placeholder { color: #475569; }
        .import-actions { display: flex; flex-direction: column; gap: 0.5rem; }
        .file-label {
            display: inline-block; padding: 0.5rem 1rem; background: #334155; color: #e2e8f0;
            border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            text-align: center; transition: all 0.2s;
        }
        .file-label:hover { background: #475569; }
        .file-input { display: none; }
        .import-hint { font-size: 0.75rem; color: #64748b; margin-top: 0.5rem; }
        .import-msg { font-size: 0.8rem; margin-top: 0.5rem; padding: 0.4rem 0.75rem; border-radius: 0.25rem; }
        .import-msg.success { background: #052e16; color: #4ade80; }
        .import-msg.error { background: #450a0a; color: #f87171; }
        .import-textarea.dragover { border-color: #38bdf8; background: #1e293b; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-danger:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

        /* Table */
        .table-wrapper {
            background: #1e293b; border-radius: 0.75rem; border: 1px solid #334155; overflow: hidden;
        }
        .table-header {
            padding: 1rem 1.25rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #334155;
        }
        .table-header h2 { font-size: 1rem; color: #e2e8f0; }
        .table-header .meta { font-size: 0.8rem; color: #64748b; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #0f172a; padding: 0.75rem 1rem; text-align: left;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: #94a3b8; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap;
        }
        th:hover { color: #38bdf8; }
        th .sort-arrow { margin-left: 0.25rem; font-size: 0.65rem; }
        td { padding: 0.65rem 1rem; border-top: 1px solid #1e293b; font-size: 0.85rem; }
        tr:hover td { background: #334155; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; }
        .badge-ok { background: #052e16; color: #4ade80; }
        .badge-slow { background: #3b2f12; color: #fbbf24; }
        .badge-fail { background: #450a0a; color: #f87171; }
        .badge-res { background: #052e16; color: #4ade80; }
        .badge-mob { background: #1e3a5f; color: #38bdf8; }
        .badge-dc { background: #3b2f12; color: #fbbf24; }
        .badge-proxy { background: #450a0a; color: #f87171; }
        .score-pill { display: inline-block; padding: 0.1rem 0.35rem; border-radius: 0.2rem; font-size: 0.7rem; font-weight: 600; margin: 0 1px; }
        .score-green { background: #052e16; color: #4ade80; }
        .score-yellow { background: #3b2f12; color: #fbbf24; }
        .score-red { background: #450a0a; color: #f87171; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: #64748b; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .copy-btn {
            background: none; border: 1px solid #475569; color: #94a3b8;
            padding: 0.2rem 0.5rem; border-radius: 0.25rem; cursor: pointer; font-size: 0.7rem;
        }
        .copy-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .copy-btn.copied { border-color: #4ade80; color: #4ade80; }

        /* Filter bar */
        .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input {
            background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
            padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.85rem;
        }
        .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #38bdf8; }

        .pool-panel { display: none; }
        .pool-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ProxyYoPick <span>SOCKS5 代理优选</span></h1>
        <div class="header-actions">
            <span id="statusBadge" class="status-badge status-idle">空闲</span>
            <button id="triggerBtn" class="btn btn-primary" onclick="triggerTest()">立即优选</button>
        </div>
    </div>

    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchPool('auto')" id="tabAuto">
                自动爬取 <span class="count" id="tabAutoCount">0</span>
            </div>
            <div class="tab" onclick="switchPool('manual')" id="tabManual">
                手动导入 <span class="count" id="tabManualCount">0</span>
            </div>
        </div>

        <!-- Auto Pool -->
        <div class="pool-panel active" id="panelAuto">
            <div class="import-section">
                <h3>手动补充代理</h3>
                <div class="import-row">
                    <textarea class="import-textarea" id="importTextAuto"
                        placeholder="输入代理列表，每行一个，格式: ip:port&#10;例如:&#10;1.2.3.4:1080&#10;5.6.7.8:8080&#10;&#10;支持拖拽 TXT 文件到此处"></textarea>
                    <div class="import-actions">
                        <label class="file-label" id="fileLabelAuto">
                            <span id="fileLabelTextAuto">选择 TXT 文件</span>
                            <input type="file" class="file-input" id="fileInputAuto" accept=".txt,.csv,.text" onchange="handleFileSelectAuto(event)">
                        </label>
                        <button class="btn btn-success" id="importBtnAuto" onclick="submitImport('auto')">添加并测试</button>
                        <div class="import-hint">手动补充的代理会加入自动池，并触发一次完整测试</div>
                    </div>
                </div>
                <div id="importMsgAuto"></div>
            </div>

            <div class="stats-grid" id="statsAuto"></div>
            <div class="filter-bar">
                <select id="filterStatusAuto" onchange="renderTable('auto')">
                    <option value="all">全部状态</option>
                    <option value="ok">仅可用</option>
                    <option value="fail">仅失败</option>
                </select>
                <select id="filterCountryAuto" onchange="renderTable('auto')">
                    <option value="all">全部国家</option>
                </select>
                <select id="filterQualityAuto" onchange="renderTable('auto')">
                    <option value="all">全部质量</option>
                    <option value="residential">住宅 IP</option>
                    <option value="mobile">移动 IP</option>
                    <option value="datacenter">机房 IP</option>
                    <option value="proxy">代理 IP</option>
                </select>
                <select id="filterScoreAuto" onchange="renderTable('auto')">
                    <option value="all">全部评分</option>
                    <option value="clean">清洁 (0-30)</option>
                    <option value="suspicious">可疑 (31-60)</option>
                    <option value="risky">高风险 (61+)</option>
                </select>
                <input type="text" id="filterIPAuto" placeholder="搜索 IP..." oninput="renderTable('auto')">
            </div>
            <div class="table-wrapper">
                <div class="table-header">
                    <h2>自动爬取代理</h2>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <button class="btn btn-secondary" onclick="exportPool('auto')" style="font-size:0.8rem; padding:0.35rem 0.75rem;">导出快照</button>
                        <label class="file-label" style="font-size:0.8rem; padding:0.35rem 0.75rem; margin:0;">
                            导入快照
                            <input type="file" class="file-input" accept=".json" onchange="importSnapshot(event, 'auto')">
                        </label>
                        <div class="meta" id="updateTimeAuto">等待首次测试...</div>
                    </div>
                </div>
                <div id="tableBodyAuto">
                    <div class="empty-state"><div class="icon">&#9881;</div><div>正在等待首次优选测试...</div></div>
                </div>
            </div>
        </div>

        <!-- Manual Pool -->
        <div class="pool-panel" id="panelManual">
            <div class="import-section">
                <h3>导入代理</h3>
                <div class="import-row">
                    <textarea class="import-textarea" id="importText"
                        placeholder="输入代理列表，每行一个，格式: ip:port&#10;例如:&#10;1.2.3.4:1080&#10;5.6.7.8:8080&#10;socks5://9.10.11.12:1080&#10;&#10;支持拖拽 TXT 文件到此处"></textarea>
                    <div class="import-actions">
                        <label class="file-label" id="fileLabel">
                            <span id="fileLabelText">选择 TXT 文件</span>
                            <input type="file" class="file-input" id="fileInput" accept=".txt,.csv,.text" onchange="handleFileSelect(event)">
                        </label>
                        <button class="btn btn-success" id="importBtn" onclick="submitImport('manual')">导入并测试</button>
                        <button class="btn btn-danger" id="clearBtn" onclick="clearManualPool()">清空列表</button>
                        <div class="import-hint">新导入的代理会追加到已有列表中<br>支持粘贴、选择文件或拖拽上传</div>
                    </div>
                </div>
                <div id="importMsg"></div>
            </div>

            <div class="stats-grid" id="statsManual"></div>
            <div class="filter-bar">
                <select id="filterStatusManual" onchange="renderTable('manual')">
                    <option value="all">全部状态</option>
                    <option value="ok">仅可用</option>
                    <option value="fail">仅失败</option>
                </select>
                <select id="filterCountryManual" onchange="renderTable('manual')">
                    <option value="all">全部国家</option>
                </select>
                <select id="filterQualityManual" onchange="renderTable('manual')">
                    <option value="all">全部质量</option>
                    <option value="residential">住宅 IP</option>
                    <option value="mobile">移动 IP</option>
                    <option value="datacenter">机房 IP</option>
                    <option value="proxy">代理 IP</option>
                </select>
                <select id="filterScoreManual" onchange="renderTable('manual')">
                    <option value="all">全部评分</option>
                    <option value="clean">清洁 (0-30)</option>
                    <option value="suspicious">可疑 (31-60)</option>
                    <option value="risky">高风险 (61+)</option>
                </select>
                <input type="text" id="filterIPManual" placeholder="搜索 IP..." oninput="renderTable('manual')">
            </div>
            <div class="table-wrapper">
                <div class="table-header">
                    <h2>手动导入代理</h2>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <button class="btn btn-secondary" onclick="exportPool('manual')" style="font-size:0.8rem; padding:0.35rem 0.75rem;">导出快照</button>
                        <label class="file-label" style="font-size:0.8rem; padding:0.35rem 0.75rem; margin:0;">
                            导入快照
                            <input type="file" class="file-input" accept=".json" onchange="importSnapshot(event, 'manual')">
                        </label>
                        <div class="meta" id="updateTimeManual">尚未导入</div>
                    </div>
                </div>
                <div id="tableBodyManual">
                    <div class="empty-state"><div class="icon">&#128230;</div><div>请在上方导入代理列表</div></div>
                </div>
            </div>
        </div>
    </div>

<script>
const state = {
    auto: { results: [], stats: {} },
    manual: { results: [], stats: {} },
};
let currentPool = 'auto';
let sortKey = 'latency_ms';
let sortAsc = true;

// -- Tab switching --
function switchPool(pool) {
    currentPool = pool;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pool-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab' + cap(pool)).classList.add('active');
    document.getElementById('panel' + cap(pool)).classList.add('active');
    updateHeaderStatus();
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// -- Data fetching --
async function fetchPool(pool) {
    try {
        const [statsResp, resultsResp] = await Promise.all([
            fetch('/api/stats?pool=' + pool),
            fetch('/api/results?pool=' + pool),
        ]);
        state[pool].stats = await statsResp.json();
        state[pool].results = await resultsResp.json() || [];
    } catch (e) { console.error('fetch error', pool, e); }
}

async function refreshAll() {
    await Promise.all([fetchPool('auto'), fetchPool('manual')]);
    renderStats('auto');
    renderStats('manual');
    renderTable('auto');
    renderTable('manual');
    updateTabCounts();
    updateHeaderStatus();
}

function updateHeaderStatus() {
    const stats = state[currentPool].stats;
    const badge = document.getElementById('statusBadge');
    const btn = document.getElementById('triggerBtn');
    if (stats.running) {
        badge.className = 'status-badge status-running';
        badge.textContent = '测试中...';
        btn.disabled = true;
    } else {
        badge.className = 'status-badge status-idle';
        badge.textContent = '空闲';
        btn.disabled = false;
    }
    // Also disable import/clear buttons if manual is running
    const importBtn = document.getElementById('importBtn');
    const clearBtn = document.getElementById('clearBtn');
    const manualRunning = state.manual.stats.running || false;
    if (importBtn) importBtn.disabled = manualRunning;
    if (clearBtn) clearBtn.disabled = manualRunning;
    // Disable auto import button if auto is running
    const importBtnAuto = document.getElementById('importBtnAuto');
    const autoRunning = state.auto.stats.running || false;
    if (importBtnAuto) importBtnAuto.disabled = autoRunning;
}

function updateTabCounts() {
    document.getElementById('tabAutoCount').textContent = state.auto.stats.total || 0;
    document.getElementById('tabManualCount').textContent = state.manual.stats.total || 0;
}

// -- Stats rendering --
function renderStats(pool) {
    const s = state[pool].stats;
    const results = state[pool].results;
    // Count quality types
    let qRes = 0, qMob = 0, qDc = 0, qProxy = 0;
    results.forEach(r => {
        switch (r.proxy.quality) {
            case 'residential': qRes++; break;
            case 'mobile': qMob++; break;
            case 'datacenter': qDc++; break;
            case 'proxy': qProxy++; break;
        }
    });
    const el = document.getElementById('stats' + cap(pool));
    el.innerHTML = `
        <div class="stat-card"><div class="label">总代理数</div><div class="value blue">${s.total || '-'}</div></div>
        <div class="stat-card"><div class="label">可用</div><div class="value green">${s.success || '-'}</div></div>
        <div class="stat-card"><div class="label">失败</div><div class="value red">${s.fail || '-'}</div></div>
        <div class="stat-card"><div class="label">最快延迟</div><div class="value yellow">${s.fastest_ms ? s.fastest_ms + ' ms' : '-'}</div></div>
        <div class="stat-card"><div class="label">平均延迟</div><div class="value yellow">${s.avg_ms ? s.avg_ms + ' ms' : '-'}</div></div>
        <div class="stat-card"><div class="label">住宅/移动/机房/代理</div><div class="value" style="font-size:1.2rem">
            <span style="color:#4ade80">${qRes}</span> /
            <span style="color:#38bdf8">${qMob}</span> /
            <span style="color:#fbbf24">${qDc}</span> /
            <span style="color:#f87171">${qProxy}</span>
        </div></div>
        ${pool === 'auto' && s.accumulated > 0 ? `
        <div class="stat-card"><div class="label">累积 / 存活 / 失效</div><div class="value" style="font-size:1.2rem">
            <span style="color:#38bdf8">${s.accumulated}</span> /
            <span style="color:#4ade80">${s.live}</span> /
            <span style="color:#6b7280">${s.dead_count}</span>
        </div></div>` : ''}
    `;
    const timeEl = document.getElementById('updateTime' + cap(pool));
    if (s.updated_at) timeEl.textContent = '上次更新: ' + s.updated_at;
}

// -- Table rendering --
function renderTable(pool) {
    const results = state[pool].results;
    const statusFilter = document.getElementById('filterStatus' + cap(pool)).value;
    const countryFilter = document.getElementById('filterCountry' + cap(pool)).value;
    const ipFilter = document.getElementById('filterIP' + cap(pool)).value.toLowerCase();
    const qualityFilter = document.getElementById('filterQuality' + cap(pool)).value;
    const scoreFilter = document.getElementById('filterScore' + cap(pool)).value;

    // Update country filter options
    const countrySel = document.getElementById('filterCountry' + cap(pool));
    const currentCountry = countrySel.value;
    const countries = [...new Set(results.map(r => r.proxy.country_code).filter(Boolean))].sort();
    countrySel.innerHTML = '<option value="all">全部国家</option>';
    countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        countrySel.appendChild(opt);
    });
    countrySel.value = currentCountry;

    let filtered = results.filter(r => {
        if (statusFilter === 'ok' && !r.success) return false;
        if (statusFilter === 'fail' && r.success) return false;
        if (countryFilter !== 'all' && r.proxy.country_code !== countryFilter) return false;
        if (ipFilter && !r.proxy.ip.includes(ipFilter)) return false;
        if (qualityFilter !== 'all' && r.proxy.quality !== qualityFilter) return false;
        if (scoreFilter !== 'all') {
            const s = r.proxy.scores;
            const maxS = Math.max(s?.ipqs ?? -1, s?.scamalytics ?? -1, s?.abuseipdb ?? -1);
            if (maxS < 0) return false;
            if (scoreFilter === 'clean' && maxS > 30) return false;
            if (scoreFilter === 'suspicious' && (maxS <= 30 || maxS > 60)) return false;
            if (scoreFilter === 'risky' && maxS <= 60) return false;
        }
        return true;
    });

    filtered.sort((a, b) => {
        let va, vb;
        switch (sortKey) {
            case 'ip': va = a.proxy.ip; vb = b.proxy.ip; break;
            case 'port': va = a.proxy.port; vb = b.proxy.port; break;
            case 'country': va = a.proxy.country_code || ''; vb = b.proxy.country_code || ''; break;
            case 'quality':
                const qOrder = {residential: 0, mobile: 1, datacenter: 2, proxy: 3};
                va = qOrder[a.proxy.quality] ?? 4; vb = qOrder[b.proxy.quality] ?? 4; break;
            case 'latency_ms':
                va = a.success ? a.latency_ms : 999999;
                vb = b.success ? b.latency_ms : 999999; break;
            case 'status': va = a.success ? 0 : 1; vb = b.success ? 0 : 1; break;
            case 'score':
                va = Math.max(a.proxy.scores?.ipqs ?? -1, a.proxy.scores?.scamalytics ?? -1, a.proxy.scores?.abuseipdb ?? -1);
                vb = Math.max(b.proxy.scores?.ipqs ?? -1, b.proxy.scores?.scamalytics ?? -1, b.proxy.scores?.abuseipdb ?? -1);
                break;
            default: va = 0; vb = 0;
        }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
    });

    const tableEl = document.getElementById('tableBody' + cap(pool));
    if (filtered.length === 0) {
        const msg = pool === 'manual' ? '请在上方导入代理列表' : '暂无数据';
        tableEl.innerHTML = `<div class="empty-state"><div class="icon">&#128269;</div><div>${msg}</div></div>`;
        return;
    }

    const arrow = (key) => sortKey === key ? (sortAsc ? ' &#9650;' : ' &#9660;') : '';
    let html = `<table><thead><tr>
        <th>#</th>
        <th onclick="setSort('ip')">IP<span class="sort-arrow">${arrow('ip')}</span></th>
        <th onclick="setSort('port')">端口<span class="sort-arrow">${arrow('port')}</span></th>
        <th onclick="setSort('country')">国家<span class="sort-arrow">${arrow('country')}</span></th>
        <th onclick="setSort('quality')">质量<span class="sort-arrow">${arrow('quality')}</span></th>
        <th onclick="setSort('score')">评分<span class="sort-arrow">${arrow('score')}</span></th>
        <th onclick="setSort('latency_ms')">延迟(ms)<span class="sort-arrow">${arrow('latency_ms')}</span></th>
        <th onclick="setSort('status')">状态<span class="sort-arrow">${arrow('status')}</span></th>
        <th>操作</th>
    </tr></thead><tbody>`;

    filtered.forEach((r, i) => {
        const addr = r.proxy.ip + ':' + r.proxy.port;
        let statusBadge, latency;
        if (r.success) {
            statusBadge = r.latency_ms < 1000
                ? '<span class="badge badge-ok">OK</span>'
                : '<span class="badge badge-slow">SLOW</span>';
            latency = r.latency_ms;
        } else {
            statusBadge = '<span class="badge badge-fail">FAIL</span>';
            latency = '-';
        }
        const cc = r.proxy.country_code || '-';
        const cn = r.proxy.country || '';
        const countryDisplay = cc !== '-' ? `<span title="${cn}">${countryToFlag(cc)} ${cc}</span>` : '-';
        const qMap = {residential: ['住宅','badge-res'], mobile: ['移动','badge-mob'], datacenter: ['机房','badge-dc'], proxy: ['代理','badge-proxy']};
        const [qLabel, qClass] = qMap[r.proxy.quality] || ['-',''];
        const qualityBadge = qClass ? `<span class="badge ${qClass}" title="${r.proxy.isp || ''}">${qLabel}</span>` : '-';
        const scoreCell = renderScoreCell(r.proxy.scores);

        html += `<tr>
            <td>${i + 1}</td>
            <td class="mono">${r.proxy.ip}</td>
            <td class="mono">${r.proxy.port}</td>
            <td>${countryDisplay}</td>
            <td>${qualityBadge}</td>
            <td>${scoreCell}</td>
            <td class="mono">${latency}</td>
            <td>${statusBadge}</td>
            <td><button class="copy-btn" onclick="copyAddr(this, '${addr}')">复制</button></td>
        </tr>`;
    });

    html += '</tbody></table>';
    tableEl.innerHTML = html;
}

function renderScoreCell(scores) {
    if (!scores) return '-';
    const vals = [
        { label: 'Q', val: scores.ipqs },
        { label: 'S', val: scores.scamalytics },
        { label: 'A', val: scores.abuseipdb },
    ];
    const parts = vals.filter(v => v.val !== undefined && v.val !== null).map(v => {
        let cls = 'score-green';
        if (v.val > 60) cls = 'score-red';
        else if (v.val > 30) cls = 'score-yellow';
        return `<span class="score-pill ${cls}" title="${v.label === 'Q' ? 'IPQS' : v.label === 'S' ? 'Scamalytics' : 'AbuseIPDB'}: ${v.val}">${v.label}:${v.val}</span>`;
    });
    return parts.length > 0 ? parts.join(' ') : '-';
}

function setSort(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    renderTable('auto');
    renderTable('manual');
}

function countryToFlag(code) {
    if (!code || code.length !== 2) return '';
    return String.fromCodePoint(...[...code.toUpperCase()].map(c => c.charCodeAt(0) + 127397));
}

// -- Actions --
async function triggerTest() {
    try {
        document.getElementById('triggerBtn').disabled = true;
        await fetch('/api/trigger?pool=' + currentPool, { method: 'POST' });
    } catch (e) { console.error('trigger error', e); }
}

function copyAddr(btn, addr) {
    navigator.clipboard.writeText(addr).then(() => {
        btn.textContent = '已复制'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    });
}

// -- Import --
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    document.getElementById('fileLabelText').textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
        const textarea = document.getElementById('importText');
        const existing = textarea.value.trim();
        textarea.value = existing ? existing + '\n' + e.target.result : e.target.result;
    };
    reader.readAsText(file);
}

function handleFileSelectAuto(event) {
    const file = event.target.files[0];
    if (!file) return;
    document.getElementById('fileLabelTextAuto').textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
        const textarea = document.getElementById('importTextAuto');
        const existing = textarea.value.trim();
        textarea.value = existing ? existing + '\n' + e.target.result : e.target.result;
    };
    reader.readAsText(file);
}

async function submitImport(pool) {
    const isAuto = pool === 'auto';
    const textarea = document.getElementById(isAuto ? 'importTextAuto' : 'importText');
    const text = textarea.value.trim();
    if (!text) {
        showImportMsg(pool, 'error', '请输入代理列表或选择文件');
        return;
    }

    const importBtn = document.getElementById(isAuto ? 'importBtnAuto' : 'importBtn');
    importBtn.disabled = true;

    try {
        const form = new FormData();
        form.append('text', text);
        const resp = await fetch('/api/import?pool=' + pool, { method: 'POST', body: form });
        const data = await resp.json();

        if (data.status === 'started') {
            textarea.value = '';
            if (isAuto) {
                document.getElementById('fileLabelTextAuto').textContent = '选择 TXT 文件';
                document.getElementById('fileInputAuto').value = '';
            } else {
                document.getElementById('fileLabelText').textContent = '选择 TXT 文件';
                document.getElementById('fileInput').value = '';
            }
            const msg = data.added > 0
                ? `新增 ${data.added} 个代理，共 ${data.total} 个，正在测试中...`
                : `无新增（全部已存在），共 ${data.total} 个，正在重新测试...`;
            showImportMsg(pool, 'success', msg);
            if (!isAuto) switchPool('manual');
        } else {
            showImportMsg(pool, 'error', data.error || '导入失败');
            importBtn.disabled = false;
        }
    } catch (e) {
        showImportMsg(pool, 'error', '请求失败: ' + e.message);
        importBtn.disabled = false;
    }
}

function showImportMsg(pool, type, msg) {
    const el = document.getElementById(pool === 'auto' ? 'importMsgAuto' : 'importMsg');
    el.innerHTML = `<div class="import-msg ${type}">${msg}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 8000);
}

// -- Drag & Drop --
function setupDragDrop(textareaId, pool) {
    const textarea = document.getElementById(textareaId);
    textarea.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        textarea.classList.add('dragover');
    });
    textarea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        e.stopPropagation();
        textarea.classList.remove('dragover');
    });
    textarea.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        textarea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length === 0) return;
        const file = files[0];
        if (!file.name.match(/\.(txt|csv|text)$/i)) {
            showImportMsg(pool, 'error', '仅支持 .txt / .csv 文件');
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const existing = textarea.value.trim();
            textarea.value = existing ? existing + '\n' + ev.target.result : ev.target.result;
        };
        reader.readAsText(file);
    });
}
setupDragDrop('importText', 'manual');
setupDragDrop('importTextAuto', 'auto');

// -- Clear Manual Pool --
async function clearManualPool() {
    if (!confirm('确定清空手动导入的代理列表？')) return;
    try {
        const resp = await fetch('/api/clear-manual', { method: 'POST' });
        const data = await resp.json();
        if (data.status === 'cleared') {
            showImportMsg('manual', 'success', '已清空手动代理列表');
            await refreshAll();
        } else {
            showImportMsg('manual', 'error', data.error || '清空失败');
        }
    } catch (e) {
        showImportMsg('manual', 'error', '请求失败: ' + e.message);
    }
}

// -- Snapshot Export/Import --
function exportPool(pool) {
    window.location.href = '/api/export?pool=' + pool;
}

async function importSnapshot(event, pool) {
    const file = event.target.files[0];
    if (!file) return;

    if (!file.name.endsWith('.json')) {
        alert('请选择 .json 快照文件');
        event.target.value = '';
        return;
    }

    if (!confirm('导入快照将替换 ' + (pool === 'auto' ? '自动' : '手动') + ' 池的所有数据，确定继续？')) {
        event.target.value = '';
        return;
    }

    const form = new FormData();
    form.append('file', file);

    try {
        const resp = await fetch('/api/snapshot-import?pool=' + pool, { method: 'POST', body: form });
        const data = await resp.json();

        if (data.status === 'imported') {
            const msg = '快照导入成功：' + data.proxies + ' 个代理，' + data.results + ' 条结果';
            showImportMsg(pool, 'success', msg);
            await refreshAll();
        } else {
            const errMsg = '导入失败：' + (data.error || '未知错误');
            showImportMsg(pool, 'error', errMsg);
        }
    } catch (e) {
        alert('导入请求失败：' + e.message);
    }

    event.target.value = '';
}

// -- Auto refresh --
setInterval(refreshAll, 5000);
refreshAll();
</script>
